  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "Zeno",
  "url": "https://zenoautomation.ai",
  "description": "AI-powered automation systems for local service businesses. Missed-call text back, AI receptionist, review automation, and appointment booking.",
  "email": "hello@zenoautomation.ai",
  "contactPoint": {
    "@type": "ContactPoint",
    "contactType": "sales",
    "email": "hello@zenoautomation.ai",
    "availableLanguage": "English"
  }
}
    </script>

    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "Is there a setup fee?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. There is a one-time setup fee of $500 for the Growth System and $750 for the Elite System. This covers full system build, AI training on your business, integrations, testing, and go-live."
      }
    },
    {
      "@type": "Question",
      "name": "Can I cancel anytime?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. There are no long-term contracts. You can cancel your subscription at any time with no cancellation fees."
      }
    },
    {
      "@type": "Question",
      "name": "What does the 14-day free trial include?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "The 14-day free trial includes full access to your selected plan — missed-call text back, AI receptionist chatbot, review automation, and appointment booking. No credit card required to start."
      }
    },
    {
      "@type": "Question",
      "name": "Do you work with my existing booking software?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. Zeno integrates directly with Google Calendar, Calendly, HubSpot, Stripe, Square, and 20+ other platforms. We work with your existing tools — no disruption to your current workflows."
      }
    },
    {
      "@type": "Question",
      "name": "How long does setup take?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Most clients are fully live within 7 days. We handle every aspect — AI training, integrations, testing, and launch. You give us 30 minutes of your time and we do the rest."
      }
    },
    {
      "@type": "Question",
      "name": "What if I need more SMS than my plan includes?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Additional SMS messages are available as an add-on at $15 per month per 1,000 messages. The Elite System includes unlimited SMS at no extra charge."
      }
    }
  ]
}
    </script>

    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Service",
  "serviceType": "AI Business Automation",
  "provider": {
    "@type": "Organization",
    "name": "Zeno"
  },
  "hasOfferCatalog": {
    "@type": "OfferCatalog",
    "name": "Zeno Plans",
    "itemListElement": [
      {
        "@type": "Offer",
        "name": "The Growth System",
        "price": "797",
        "priceCurrency": "USD",
        "description": "Complete done-for-you automation stack including AI missed-call text back, AI receptionist chatbot, appointment booking, review generation, and performance dashboard."
      },
      {
        "@type": "Offer",
        "name": "The Elite System",
        "price": "1497",
        "priceCurrency": "USD",
        "description": "Everything in Growth plus custom AI voice training, weekly strategy calls, dedicated account manager, revenue attribution dashboard, and unlimited SMS."
      }
    ]
  }
}
    </script>
  </body>
</html>
