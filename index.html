    <style>
      body::before {
        content: '';
        display: block;
        position: fixed;
        top: 0; left: 0; right: 0;
        height: 2px;
        background: #2563EB;
        z-index: 9999;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: #050505; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }
      * { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.15) #050505; }

      /* Remove default focus outline, add premium one */
      :focus-visible {
        outline: 2px solid rgba(37,99,235,0.6);
        outline-offset: 3px;
        border-radius: 4px;
      }
      button:focus:not(:focus-visible),
      a:focus:not(:focus-visible) {
        outline: none;
      }

      ::selection {
        background: rgba(37,99,235,0.35);
        color: #fff;
      }

      /* UPGRADE 3 — Animated gradient border on primary CTA */
      @keyframes gradient-shift {
        0%   { background-position: 0% 50%; }
        50%  { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      /* UPGRADE 4 — Dot grid background pattern */
      .dot-grid {
        background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
        background-size: 32px 32px;
      }

      /* UPGRADE 14 — Subtle noise texture on cards */
      .glass-card {
        position: relative;
      }
      .glass-card::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 1;
        opacity: 0.4;
      }
    </style>
  </head>

}
    </script>

    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "Is there a setup fee?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. There is a one-time setup fee of $500 for the Growth System and $750 for the Elite System. This covers full system build, AI training on your business, integrations, testing, and go-live."
      }
    },
    {
      "@type": "Question",
      "name": "Can I cancel anytime?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. There are no long-term contracts. You can cancel your subscription at any time with no cancellation fees."
      }
    },
    {
      "@type": "Question",
      "name": "What does the 14-day free trial include?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "The 14-day free trial includes full access to your selected plan — missed-call text back, AI receptionist chatbot, review automation, and appointment booking. No credit card required to start."
      }
    },
    {
      "@type": "Question",
      "name": "Do you work with my existing booking software?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. Zeno integrates directly with Google Calendar, Calendly, HubSpot, Stripe, Square, and 20+ other platforms. We work with your existing tools — no disruption to your current workflows."
      }
    },
    {
      "@type": "Question",
      "name": "How long does setup take?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Most clients are fully live within 7 days. We handle every aspect — AI training, integrations, testing, and launch. You give us 30 minutes of your time and we do the rest."
      }
    },
    {
      "@type": "Question",
      "name": "What if I need more SMS than my plan includes?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Additional SMS messages are available as an add-on at $15 per month per 1,000 messages. The Elite System includes unlimited SMS at no extra charge."
      }
    }
  ]
}
    </script>
